name: User Story
description: A backlog item for a feature or user-facing capability
title: "[Story]: "
labels: ["user-story"]
projects: ["RallyDeals/1"]
body:
  - type: textarea
    id: story
    attributes:
      label: Story
      placeholder: "As .. I want .. so that .."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List as checkboxes. Be specific enough that "done" is unambiguous.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Related services
      description: Any other service, event, or endpoint this story depends on (e.g. "requires deal.target_reached event from Deal Service")
      placeholder: "e.g. depends on Order Service publishing order.created"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any notes needed for this user story to be implemented
    validations:
      required: false
